<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:sans-serif;
}

.wrap{
  display:flex;
  gap:24px;
  padding:24px;
  overflow:auto;
}

.card{
  min-width:320px;
  background:#1b1b1b;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 8px 30px rgba(0,0,0,.35);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  display:block;
}

.content{
  padding:18px;
}

.title{
  font-size:22px;
  font-weight:700;
  margin-bottom:8px;
}

.desc{
  opacity:.8;
}
</style>
</head>

<body>

<div class="wrap" id="app"></div>

<script src="https://digitalgojp.sharepoint.com/sites/NTA_IBHub12/SiteAssets/carousel-data.js"></script>

<script>
const app = document.getElementById("app");

(window.carouselData || []).forEach(item => {

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img src="${item.image}">
    <div class="content">
      <div class="title">${item.title}</div>
      <div class="desc">${item.description}</div>
    </div>
  `;

  card.onclick = () => {
    window.open(item.link, "_blank");
  };

  app.appendChild(card);
});
</script>

</body>
</html>
